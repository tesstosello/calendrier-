<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a6e">
<title>Retraite 2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  min-height:100dvh;
  font-family:'Georgia',serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  background:linear-gradient(180deg,
    #0b1a35 0%,
    #1b3d70 15%,
    #2f72b0 26%,
    #ea8a55 38%,
    #f7bf6a 46%,
    #d6e98a 51%,
    #8ecb68 57%,
    #4fa836 100%
  );
  position:relative;
  overflow:hidden;
}

/* ── STARS ── */
.stars{position:absolute;top:0;left:0;width:100%;height:50%;pointer-events:none;z-index:1}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite var(--e)}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.95}}

/* ── SUN ── */
.sun-wrap{position:absolute;top:6%;right:8%;z-index:2;pointer-events:none}
.sun{
  width:clamp(52px,13vw,76px);height:clamp(52px,13vw,76px);
  border-radius:50%;
  background:radial-gradient(circle,#fffbe0 15%,#ffd93d 58%,#ffb347 100%);
  box-shadow:0 0 20px 10px #ffd93d55,0 0 50px 24px #ffb34733;
  animation:sunpulse 4s ease-in-out infinite;
  position:relative;
}
@keyframes sunpulse{
  0%,100%{box-shadow:0 0 20px 10px #ffd93d55,0 0 50px 24px #ffb34733}
  50%{box-shadow:0 0 36px 18px #ffd93d88,0 0 80px 40px #ffb34755}
}
.ray{
  position:absolute;
  width:3px;background:linear-gradient(to top,#ffd93dcc,transparent);
  border-radius:2px;transform-origin:bottom center;
  animation:raypulse 4s ease-in-out infinite;
}
@keyframes raypulse{
  0%,100%{opacity:.35;transform:scaleY(.8) rotate(var(--r))}
  50%{opacity:.75;transform:scaleY(1.3) rotate(var(--r))}
}

/* ── CLOUDS ── */
.cloud{position:absolute;z-index:2;pointer-events:none;animation:drift linear infinite}
@keyframes drift{from{transform:translateX(-250px)}to{transform:translateX(110vw)}}

/* ── LAYOUT COLUMN ── */
.layout{
  position:relative;
  z-index:10;
  width:100%;
  max-width:480px;
  padding: env(safe-area-inset-top, 0px) 16px env(safe-area-inset-bottom, 0px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  height:100dvh;
  min-height:500px;
}

/* ── TITLE BLOCK ── */
.title-block{
  flex:0 0 auto;
  text-align:center;
  padding-top:clamp(10px,4vw,28px);
  padding-bottom:clamp(4px,2vw,10px);
}
.title-main{
  font-size:clamp(1.3rem,5.5vw,1.9rem);
  font-weight:700;color:#fff;
  text-shadow:0 2px 12px #00000077,0 0 28px #ffd93d88;
  line-height:1.15;
}
.title-sub{
  font-size:clamp(.72rem,2.8vw,.88rem);
  color:#ffe8b8;font-style:italic;
  margin-top:4px;
  text-shadow:0 1px 6px #00000055;
  letter-spacing:.05em;
}

/* ── COUNTDOWN ── */
.countdown{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:clamp(6px,2vw,12px);
  width:100%;
}
.box{
  background:rgba(255,255,255,.17);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.42);
  border-radius:clamp(10px,2.5vw,16px);
  padding:clamp(8px,2.5vw,14px) 4px;
  text-align:center;
}
.num{
  font-size:clamp(1.55rem,6.5vw,2.5rem);
  font-weight:700;color:#fff;line-height:1;
  text-shadow:0 2px 8px #00000044;
  font-variant-numeric:tabular-nums;
  font-family:Arial,sans-serif;
  display:block;
}
.lbl{
  font-size:clamp(.5rem,1.7vw,.62rem);
  color:rgba(255,255,255,.78);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-top:3px;
  font-family:Arial,sans-serif;
  display:block;
}

/* ── TAGLINE ── */
.tagline{
  flex:0 0 auto;
  font-size:clamp(.65rem,2.4vw,.78rem);
  color:#ffe8b0;font-style:italic;
  text-shadow:0 1px 5px #00000066;
  text-align:center;
  padding:4px 8px 0;
}

/* ── SCENE ── */
.scene-wrap{
  flex:1 1 0;
  width:100%;
  position:relative;
  min-height:0;
  overflow:hidden;
}

/* mountains behind everything */
.scene-wrap svg.mtn{position:absolute;width:100%;pointer-events:none}

/* fence */
.scene-wrap svg.fence{position:absolute;bottom:38%;width:100%;height:28px;pointer-events:none}

/* ground strip */
.ground{
  position:absolute;bottom:0;left:0;width:100%;
  height:38%;
  background:linear-gradient(180deg,#5fb84d,#3d8f2e);
}

/* furrows */
.furrows{position:absolute;bottom:38%;width:100%;height:36px;pointer-events:none}

/* animals & hay row */
.animal-row{
  position:absolute;bottom:38%;
  width:100%;
  display:flex;
  align-items:flex-end;
  justify-content:space-around;
  padding:0 2%;
  pointer-events:none;
}
.animal-row span{
  display:inline-block;
  font-size:clamp(1.6rem,5.5vw,2.6rem);
  animation:bob var(--d,2s) ease-in-out infinite var(--e,0s);
  line-height:1;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* tractor */
.tractor{
  position:absolute;bottom:38%;
  font-size:clamp(1.8rem,6.5vw,3rem);
  animation:drv var(--spd,20s) linear infinite var(--e,0s);
  pointer-events:none;
  line-height:1;
}
@keyframes drv{from{left:-100px}to{left:110%}}

/* flower strip */
.flower-row{
  position:absolute;bottom:6%;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-evenly;
  pointer-events:none;
}
.flower-row span{
  font-size:clamp(.9rem,3.2vw,1.4rem);
  animation:bob 2.2s ease-in-out infinite var(--e,0s);
}

/* landscape squeeze */
@media (orientation:landscape) and (max-height:420px){
  .title-sub{display:none}
  .scene-wrap{min-height:60px}
  .box{padding:6px 4px}
  .num{font-size:1.2rem}
  .lbl{font-size:.48rem}
  .tagline{font-size:.6rem}
}
</style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<!-- Sun + rays -->
<div class="sun-wrap" id="sunWrap">
  <div class="sun" id="sun"></div>
</div>

<!-- Clouds -->
<div id="clouds"></div>

<!-- ── MAIN COLUMN LAYOUT ── -->
<div class="layout">

  <!-- 1. Title -->
  <div class="title-block">
    <div class="title-main">✨ Cap sur la Retraite ✨</div>
    <div class="title-sub">Le grand départ approche doucement…</div>
  </div>

  <!-- 2. Countdown -->
  <div class="countdown">
    <div class="box"><span class="num" id="days">—</span><span class="lbl">Jours</span></div>
    <div class="box"><span class="num" id="hours">—</span><span class="lbl">Heures</span></div>
    <div class="box"><span class="num" id="minutes">—</span><span class="lbl">Min</span></div>
    <div class="box"><span class="num" id="seconds">—</span><span class="lbl">Sec</span></div>
  </div>

  <!-- 3. Tagline -->
  <div class="tagline" id="tl">🚜 Encore un peu de route avant la liberté&nbsp;! 🌾</div>

  <!-- 4. Scene (fills remaining space) -->
  <div class="scene-wrap" id="sceneWrap">

    <!-- Mountains far -->
    <svg class="mtn" id="mtn1" viewBox="0 0 800 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,130 80,25 170,130" fill="#265014" opacity=".4"/>
      <polygon points="110,130 250,8 400,130"  fill="#306018" opacity=".34"/>
      <polygon points="310,130 460,18 610,130" fill="#265014" opacity=".38"/>
      <polygon points="510,130 650,6 800,130"  fill="#306018" opacity=".32"/>
      <polygon points="680,130 790,30 920,130" fill="#265014" opacity=".36"/>
    </svg>

    <!-- Mountains near -->
    <svg class="mtn" id="mtn2" viewBox="0 0 800 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,90 65,22 140,90"   fill="#478c2e"/>
      <polygon points="90,90 220,6 360,90"  fill="#57a838"/>
      <polygon points="290,90 420,18 550,90" fill="#478c2e"/>
      <polygon points="470,90 610,4 760,90"  fill="#57a838"/>
      <polygon points="660,90 790,26 920,90" fill="#478c2e"/>
    </svg>

    <!-- Furrow lines -->
    <svg class="furrows" id="furrows" viewBox="0 0 800 36" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 8  Q200 3  400 8  Q600 13 800 8"  stroke="#3d8c26" stroke-width="1.5" fill="none" opacity=".6"/>
      <path d="M0 18 Q200 13 400 18 Q600 23 800 18" stroke="#3d8c26" stroke-width="1.5" fill="none" opacity=".6"/>
      <path d="M0 28 Q200 23 400 28 Q600 33 800 28" stroke="#3d8c26" stroke-width="1.5" fill="none" opacity=".6"/>
    </svg>

    <!-- Fence -->
    <svg class="fence" id="fence" viewBox="0 0 800 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="10" x2="800" y2="10" stroke="#8b5e3c" stroke-width="2.5"/>
      <line x1="0" y1="20" x2="800" y2="20" stroke="#8b5e3c" stroke-width="2.5"/>
      <!-- posts generated by JS -->
    </svg>

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Animals + hay in one flex row, above ground -->
    <div class="animal-row">
      <span style="--d:2.3s;--e:0s">🌾</span>
      <span style="--d:1.8s;--e:.2s">🐄</span>
      <span style="--d:2.5s;--e:.5s">🌾</span>
      <span style="--d:1.9s;--e:.8s">🐴</span>
      <span style="--d:2.2s;--e:.3s">🌾</span>
      <span style="--d:2.0s;--e:1.1s">🐑</span>
      <span style="--d:2.4s;--e:.6s">🌾</span>
    </div>

    <!-- Tractors -->
    <div class="tractor" style="--spd:20s;--e:0s">🚜</div>
    <div class="tractor" style="--spd:20s;--e:10s">🚜</div>

    <!-- Flowers -->
    <div class="flower-row">
      <span style="--e:0s">🌻</span>
      <span style="--e:.3s">🌼</span>
      <span style="--e:.7s">🌺</span>
      <span style="--e:.2s">🌻</span>
      <span style="--e:.9s">🌼</span>
      <span style="--e:.4s">🌻</span>
      <span style="--e:1.1s">🌺</span>
      <span style="--e:.6s">🌼</span>
    </div>

  </div>
</div>

<script>
(function(){

  // Stars
  const starsEl = document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2+.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--e:${Math.random()*5}s`;
    starsEl.appendChild(s);
  }

  // Sun rays
  function buildRays(){
    const wrap=document.getElementById('sunWrap');
    wrap.querySelectorAll('.ray').forEach(r=>r.remove());
    const sun=document.getElementById('sun');
    const sd=sun.offsetWidth||60;
    for(let i=0;i<12;i++){
      const r=document.createElement('div');
      r.className='ray';
      const ang=i*30, len=14+Math.random()*10;
      r.style.cssText=`width:3px;height:${len}px;position:absolute;top:${sd/2-len}px;left:${sd/2-1.5}px;--r:${ang}deg;transform:rotate(${ang}deg);transform-origin:bottom center;animation-delay:${i*.25}s`;
      wrap.appendChild(r);
    }
  }
  buildRays();

  // Clouds
  const cloudsEl=document.getElementById('clouds');
  [{top:'7%',w:130,h:34,dur:33,del:0,op:.84},
   {top:'13%',w:96,h:28,dur:50,del:12,op:.66},
   {top:'5%',w:158,h:44,dur:41,del:23,op:.76},
   {top:'19%',w:72,h:22,dur:60,del:7,op:.5}
  ].forEach(c=>{
    const d=document.createElement('div');
    d.className='cloud';
    d.style.cssText=`top:${c.top};animation-duration:${c.dur}s;animation-delay:${c.del}s`;
    d.innerHTML=`<svg width="${c.w}" height="${c.h}" viewBox="0 0 ${c.w} ${c.h}" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="${c.w*.44}" cy="${c.h*.7}"  rx="${c.w*.41}" ry="${c.h*.38}" fill="white" opacity="${c.op}"/>
      <ellipse cx="${c.w*.66}" cy="${c.h*.52}" rx="${c.w*.27}" ry="${c.h*.36}" fill="white" opacity="${c.op}"/>
      <ellipse cx="${c.w*.27}" cy="${c.h*.64}" rx="${c.w*.21}" ry="${c.h*.3}"  fill="white" opacity="${c.op}"/>
    </svg>`;
    cloudsEl.appendChild(d);
  });

  // Fence posts
  function buildFencePosts(){
    const svg=document.getElementById('fence');
    svg.querySelectorAll('.fp').forEach(e=>e.remove());
    for(let x=0;x<=800;x+=48){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x);l.setAttribute('y1','3');
      l.setAttribute('x2',x);l.setAttribute('y2','25');
      l.setAttribute('stroke','#8b5e3c');l.setAttribute('stroke-width','3.5');
      l.setAttribute('stroke-linecap','round');l.classList.add('fp');
      svg.appendChild(l);
    }
  }
  buildFencePosts();

  // Position scene layers based on scene-wrap height
  function positionScene(){
    const wrap=document.getElementById('sceneWrap');
    const h=wrap.offsetHeight||200;

    // mountains: top-anchored within scene
    document.getElementById('mtn1').style.cssText=`position:absolute;width:100%;top:0;height:${Math.round(h*.5)}px;pointer-events:none`;
    document.getElementById('mtn2').style.cssText=`position:absolute;width:100%;top:${Math.round(h*.08)}px;height:${Math.round(h*.42)}px;pointer-events:none`;
    document.getElementById('furrows').style.bottom='38%';
    document.getElementById('fence').style.bottom='38%';
  }
  positionScene();

  let t;
  window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(()=>{positionScene();buildRays();},80)});
  window.addEventListener('orientationchange',()=>{setTimeout(()=>{positionScene();buildRays();},200)});

  // Countdown
  const target=new Date("January 1, 2027 00:00:00").getTime();
  function pad(n){return String(n).padStart(2,'0')}
  function tick(){
    const dist=target-Date.now();
    if(dist<=0){
      document.getElementById('days').textContent='0';
      document.getElementById('hours').textContent='00';
      document.getElementById('minutes').textContent='00';
      document.getElementById('seconds').textContent='00';
      document.getElementById('tl').textContent='🎉 Bonne Retraite ! Profitez bien ! 🌾';
      return;
    }
    document.getElementById('days').textContent=Math.floor(dist/864e5);
    document.getElementById('hours').textContent=pad(Math.floor((dist%864e5)/36e5));
    document.getElementById('minutes').textContent=pad(Math.floor((dist%36e5)/6e4));
    document.getElementById('seconds').textContent=pad(Math.floor((dist%6e4)/1e3));
  }
  tick();setInterval(tick,1000);

})();
</script>
</body>
</html>
