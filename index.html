<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite 2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Georgia',serif}
body{
  background:linear-gradient(180deg,
    #1a3a5c 0%, #2e6fa8 18%, #f4a65a 32%, #f7c97a 38%,
    #e8f4b8 44%, #b4dca0 47%, #7bbf6a 52%, #5a9e50 100%
  );
  position:relative;
}
.stars{position:absolute;top:0;left:0;width:100%;height:38%;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--del,0s)}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.sun-wrap{position:absolute;top:5%;right:12%;width:90px;height:90px}
.sun{width:90px;height:90px;background:radial-gradient(circle,#fff9e0 30%,#ffd93d 65%,#ffb347 100%);border-radius:50%;box-shadow:0 0 30px 15px #ffd93d88,0 0 60px 30px #ffb34744;animation:sun-pulse 4s ease-in-out infinite}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 30px 15px #ffd93d88,0 0 60px 30px #ffb34744}50%{box-shadow:0 0 50px 25px #ffd93daa,0 0 100px 50px #ffb34766}}
.ray{position:absolute;width:3px;background:linear-gradient(to top,#ffd93d,transparent);border-radius:2px;transform-origin:bottom center;opacity:0.6;animation:ray-pulse 4s ease-in-out infinite}
@keyframes ray-pulse{0%,100%{opacity:0.4;transform:scaleY(0.8) rotate(var(--r))}50%{opacity:0.8;transform:scaleY(1.2) rotate(var(--r))}}
.cloud{position:absolute;animation:cloud-drift linear infinite}
@keyframes cloud-drift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
.mountain-layer{position:absolute;width:100%;pointer-events:none}
.ground{position:absolute;bottom:0;left:0;width:100%;height:50%}
.animal{position:absolute;font-size:2.4rem;animation:bob var(--d,2s) ease-in-out infinite var(--del,0s)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.tractor{position:absolute;font-size:3.2rem;animation:drive var(--spd,22s) linear infinite var(--del,0s)}
@keyframes drive{from{left:-120px}to{left:110%}}
.flower{position:absolute;font-size:1.4rem;animation:bob 2s ease-in-out infinite var(--del,0s)}
.hay{position:absolute;bottom:34%;font-size:2.8rem;animation:bob var(--d,2.5s) ease-in-out infinite var(--del,0s)}
.ground-strip{position:absolute;bottom:0;left:0;width:100%;height:30%;background:linear-gradient(to bottom,#6abf5a,#4e9e3f)}
.title-area{position:absolute;top:6%;left:50%;transform:translateX(-50%);text-align:center;width:90%;z-index:20}
.title-main{font-size:2rem;font-weight:700;color:#fff;text-shadow:0 2px 12px #00000055,0 0 30px #ffd93d88;letter-spacing:0.04em}
.title-sub{font-size:0.95rem;color:#ffe8b0;text-shadow:0 1px 6px #00000044;margin-top:4px;font-style:italic;letter-spacing:0.08em}
.countdown-wrap{position:absolute;bottom:54%;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:96%}
.box{background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.5);border-radius:18px;padding:14px 18px;min-width:90px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.18)}
.num{font-size:2.4rem;font-weight:700;color:#fff;line-height:1;text-shadow:0 2px 8px rgba(0,0,0,0.3);font-variant-numeric:tabular-nums}
.lbl{font-size:0.62rem;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;font-family:Arial,sans-serif;font-weight:500}
.tagline{position:absolute;bottom:52%;left:50%;transform:translateX(-50%);margin-top:8px;white-space:nowrap;font-size:0.8rem;color:#ffe8b0;text-shadow:0 1px 6px #00000044;font-style:italic;z-index:30}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="sun-wrap" id="sunWrap"><div class="sun"></div></div>
<div id="clouds"></div>

<svg class="mountain-layer" style="bottom:45%;height:180px;" viewBox="0 0 1200 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="0,180 120,40 240,180" fill="#2e5c1a" opacity="0.35"/>
  <polygon points="160,180 310,20 460,180" fill="#3a7023" opacity="0.3"/>
  <polygon points="350,180 520,50 690,180" fill="#2e5c1a" opacity="0.35"/>
  <polygon points="580,180 740,15 900,180" fill="#3a7023" opacity="0.28"/>
  <polygon points="820,180 980,35 1140,180" fill="#2e5c1a" opacity="0.33"/>
  <polygon points="1000,180 1150,55 1300,180" fill="#3a7023" opacity="0.3"/>
</svg>
<svg class="mountain-layer" style="bottom:44%;height:120px;" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="0,120 80,30 180,120" fill="#4a8e30"/>
  <polygon points="100,120 240,10 390,120" fill="#5aa035"/>
  <polygon points="300,120 450,25 600,120" fill="#4a8e30"/>
  <polygon points="500,120 660,8 820,120" fill="#5aa035"/>
  <polygon points="720,120 880,30 1040,120" fill="#4a8e30"/>
  <polygon points="950,120 1100,18 1260,120" fill="#5aa035"/>
</svg>

<div class="ground">
  <svg style="position:absolute;bottom:30%;left:0;width:100%;height:50px;" viewBox="0 0 1200 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 10 Q150 5 300 10 Q450 15 600 10 Q750 5 900 10 Q1050 15 1200 10" stroke="#4a8e30" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M0 22 Q150 17 300 22 Q450 27 600 22 Q750 17 900 22 Q1050 27 1200 22" stroke="#4a8e30" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M0 34 Q150 29 300 34 Q450 39 600 34 Q750 29 900 34 Q1050 39 1200 34" stroke="#4a8e30" stroke-width="2" fill="none" opacity="0.6"/>
  </svg>
  <svg style="position:absolute;bottom:35%;left:0;width:100%;height:30px;" viewBox="0 0 1200 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="12" x2="1200" y2="12" stroke="#8b5e3c" stroke-width="2.5"/>
    <line x1="0" y1="22" x2="1200" y2="22" stroke="#8b5e3c" stroke-width="2.5"/>
    <line x1="0" y1="4" x2="0" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="60" y1="4" x2="60" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="120" y1="4" x2="120" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="180" y1="4" x2="180" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="240" y1="4" x2="240" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="300" y1="4" x2="300" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="360" y1="4" x2="360" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="420" y1="4" x2="420" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="480" y1="4" x2="480" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="540" y1="4" x2="540" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="600" y1="4" x2="600" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="660" y1="4" x2="660" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="720" y1="4" x2="720" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="780" y1="4" x2="780" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="840" y1="4" x2="840" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="900" y1="4" x2="900" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="960" y1="4" x2="960" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="1020" y1="4" x2="1020" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="1080" y1="4" x2="1080" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="1140" y1="4" x2="1140" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="1200" y1="4" x2="1200" y2="28" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <div class="hay" style="--d:2.2s;--del:0s;left:7%">🌾</div>
  <div class="hay" style="--d:2.8s;--del:0.5s;left:28%">🌾</div>
  <div class="hay" style="--d:2.4s;--del:1.1s;left:55%">🌾</div>
  <div class="hay" style="--d:2.6s;--del:0.7s;left:80%">🌾</div>

  <div class="animal" style="--d:1.8s;--del:0.2s;bottom:35%;left:18%;font-size:2.8rem">🐄</div>
  <div class="animal" style="--d:2.0s;--del:0.9s;bottom:35%;left:44%;font-size:2.6rem">🐴</div>
  <div class="animal" style="--d:1.7s;--del:1.5s;bottom:35%;left:68%;font-size:2.5rem">🐑</div>

  <div class="tractor" style="--spd:20s;--del:0s;bottom:34%">🚜</div>
  <div class="tractor" style="--spd:20s;--del:10s;bottom:34%">🚜</div>

  <div class="ground-strip"></div>
  <div class="flower" style="--del:0s;bottom:6%;left:4%">🌻</div>
  <div class="flower" style="--del:0.3s;bottom:5%;left:12%">🌼</div>
  <div class="flower" style="--del:0.7s;bottom:7%;left:24%">🌺</div>
  <div class="flower" style="--del:0.2s;bottom:6%;left:42%">🌻</div>
  <div class="flower" style="--del:0.9s;bottom:5%;left:58%">🌼</div>
  <div class="flower" style="--del:0.4s;bottom:7%;left:73%">🌻</div>
  <div class="flower" style="--del:1.1s;bottom:6%;left:86%">🌺</div>
  <div class="flower" style="--del:0.6s;bottom:5%;left:94%">🌼</div>
</div>

<div class="title-area">
  <div class="title-main">✨ Cap sur la Retraite ✨</div>
  <div class="title-sub">Le grand départ approche doucement…</div>
</div>

<div class="countdown-wrap">
  <div class="box"><div class="num" id="days">—</div><div class="lbl">Jours</div></div>
  <div class="box"><div class="num" id="hours">—</div><div class="lbl">Heures</div></div>
  <div class="box"><div class="num" id="minutes">—</div><div class="lbl">Minutes</div></div>
  <div class="box"><div class="num" id="seconds">—</div><div class="lbl">Secondes</div></div>
</div>
<div class="tagline" id="tagline">🚜 Encore un peu de route avant la liberté ! 🌾</div>

<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=Math.random()*2.5+1;
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--del:${Math.random()*5}s`;
  starsEl.appendChild(s);
}

const sw=document.getElementById('sunWrap');
for(let i=0;i<12;i++){
  const r=document.createElement('div');
  r.className='ray';
  const ang=i*30,len=18+Math.random()*12;
  r.style.cssText=`width:3px;height:${len}px;position:absolute;top:${45-len}px;left:43px;--r:${ang}deg;transform-origin:bottom center;transform:rotate(${ang}deg);animation-delay:${i*0.3}s`;
  sw.appendChild(r);
}

const cloudsEl=document.getElementById('clouds');
[
  {top:'8%',w:140,h:38,dur:35,del:0,op:0.88},
  {top:'14%',w:100,h:28,dur:50,del:12,op:0.70},
  {top:'6%',w:180,h:48,dur:42,del:25,op:0.80},
  {top:'18%',w:80,h:24,dur:60,del:8,op:0.55},
  {top:'11%',w:120,h:34,dur:38,del:18,op:0.65},
].forEach(c=>{
  const d=document.createElement('div');
  d.className='cloud';
  d.style.cssText=`top:${c.top};animation-duration:${c.dur}s;animation-delay:${c.del}s`;
  d.innerHTML=`<svg width="${c.w}" height="${c.h}" viewBox="0 0 ${c.w} ${c.h}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="${c.w*.45}" cy="${c.h*.7}" rx="${c.w*.42}" ry="${c.h*.4}" fill="white" opacity="${c.op}"/>
    <ellipse cx="${c.w*.65}" cy="${c.h*.55}" rx="${c.w*.28}" ry="${c.h*.38}" fill="white" opacity="${c.op}"/>
    <ellipse cx="${c.w*.28}" cy="${c.h*.65}" rx="${c.w*.22}" ry="${c.h*.32}" fill="white" opacity="${c.op}"/>
  </svg>`;
  cloudsEl.appendChild(d);
});

const target=new Date("January 1, 2027 00:00:00").getTime();
function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const dist=target-Date.now();
  if(dist<=0){
    document.getElementById('days').textContent='0';
    document.getElementById('hours').textContent='00';
    document.getElementById('minutes').textContent='00';
    document.getElementById('seconds').textContent='00';
    document.getElementById('tagline').textContent='🎉 Bonne Retraite ! Profitez bien ! 🌾';
    return;
  }
  document.getElementById('days').textContent=Math.floor(dist/864e5);
  document.getElementById('hours').textContent=pad(Math.floor((dist%864e5)/36e5));
  document.getElementById('minutes').textContent=pad(Math.floor((dist%36e5)/6e4));
  document.getElementById('seconds').textContent=pad(Math.floor((dist%6e4)/1e3));
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
