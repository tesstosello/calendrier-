<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown — 1er Janvier 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --surface: #ffffff;
  --surface2: #f0ece5;
  --border: rgba(30,25,20,0.08);
  --border-strong: rgba(30,25,20,0.15);
  --accent: #c94a2a;
  --accent-bg: rgba(201,74,42,0.07);
  --accent-border: rgba(201,74,42,0.2);
  --blue: #2a6fc9;
  --blue-bg: rgba(42,111,201,0.07);
  --blue-border: rgba(42,111,201,0.25);
  --text: #1a1612;
  --text-secondary: rgba(26,22,18,0.55);
  --text-dim: rgba(240,237,232,0.22);
  --radius: 14px;
  --radius-sm: 8px;
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Playfair Display', serif;
  --sans: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 16px 64px;
}

/* ── HERO ── */
.hero {
  padding: 48px 0 36px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.eyebrow::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--accent);
}

.hero-title {
  font-family: var(--serif);
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 400;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 8px;
}

.hero-title em {
  font-style: italic;
  color: var(--accent);
}

.hero-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 12px;
}

/* ── COUNTDOWN GRID ── */
.count-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.count-hero {
  grid-column: span 2;
  background: var(--accent);
  border-radius: var(--radius);
  padding: 24px 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.count-hero::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}

.count-hero .label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
}

.count-hero .num {
  font-family: var(--serif);
  font-size: clamp(52px, 12vw, 72px);
  line-height: 1;
  color: #fff;
  font-weight: 700;
}

.count-hero .sub {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.6);
}

.count-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
}

.count-card .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.count-card .num {
  font-family: var(--serif);
  font-size: clamp(30px, 7vw, 42px);
  line-height: 1;
  color: var(--text);
}

/* ── PROGRESS ── */
.progress-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.progress-top .label {
  font-size: 13px;
  color: var(--text-secondary);
}

.progress-top .pct {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.progress-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 10px;
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--blue) 0%, var(--accent) 100%);
}

.progress-dates {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-secondary);
}

/* ── CALENDAR ── */
.cal-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}

.cal-month {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
}

.nav-btn {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  font-family: var(--sans);
}

.nav-btn:hover { background: var(--surface2); color: var(--text); }

.day-names {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
}

.day-name {
  text-align: center;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
  padding: 10px 0;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  padding: 8px;
}

.day-cell {
  border-radius: 8px;
  padding: 6px 3px 5px;
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.day-cell.past {
  opacity: 0.35;
}

.day-cell.beyond {
  opacity: 0.2;
}

.day-cell.today {
  background: var(--blue-bg);
  outline: 1px solid var(--blue-border);
}

.day-cell.deadline {
  background: var(--accent-bg);
  outline: 1.5px solid var(--accent-border);
}

.day-num {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.day-cell.today .day-num { color: var(--blue); }
.day-cell.deadline .day-num { color: var(--accent); font-weight: 700; }

.day-rest {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.2;
}

.day-cell.today .day-rest { color: var(--blue); }
.day-cell.deadline .day-rest { color: var(--accent); font-size: 8px; }

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--text-secondary);
  font-family: var(--mono);
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-dot.today { background: var(--blue-bg); outline: 1px solid var(--blue-border); }
.legend-dot.deadline { background: var(--accent-bg); outline: 1px solid var(--accent-border); }
.legend-dot.past { background: var(--surface2); outline: 1px solid var(--border-strong); }

/* ── DESKTOP ENHANCEMENTS ── */
@media (min-width: 480px) {
  .page { padding: 0 24px 64px; }
  .hero { padding: 64px 0 40px; }
  .count-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .count-hero { grid-column: span 4; }
}

@media (min-width: 640px) {
  .page { padding: 0 32px 80px; }
  .cal-grid { gap: 4px; padding: 12px; }
  .day-cell { min-height: 58px; padding: 8px 4px 6px; }
  .day-num { font-size: 13px; }
  .day-rest { font-size: 10px; }
}
</style>
</head>
<body>
<main class="page">

  <header class="hero">
    <div class="eyebrow">compte à rebours</div>
    <h1 class="hero-title">1<sup>er</sup> <em>janvier</em><br>2027</h1>
    <p class="hero-sub" id="today-label">—</p>
  </header>

  <section class="count-grid" aria-label="Décompte">
    <div class="count-hero">
      <div>
        <div class="label">jours restants</div>
        <div class="sub" id="cnt-sub">—</div>
      </div>
      <div class="num" id="cnt-days">—</div>
    </div>
    <div class="count-card">
      <div class="label">Mois</div>
      <div class="num" id="cnt-months">—</div>
    </div>
    <div class="count-card">
      <div class="label">Semaines</div>
      <div class="num" id="cnt-weeks">—</div>
    </div>
    <div class="count-card">
      <div class="label">Jours ouvrés</div>
      <div class="num" id="cnt-work">—</div>
    </div>
    <div class="count-card">
      <div class="label">Heures</div>
      <div class="num" id="cnt-hours">—</div>
    </div>
  </section>

  <div class="progress-block">
    <div class="progress-top">
      <span class="label">Progression</span>
      <span class="pct" id="prog-pct">—</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-dates">
      <span id="prog-start">—</span>
      <span>1 jan. 2027</span>
    </div>
  </div>

  <div class="cal-block">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Mois précédent">&#8249;</button>
      <span class="cal-month" id="cal-title">—</span>
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Mois suivant">&#8250;</button>
    </div>
    <div class="day-names" id="day-names"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot today"></div>Aujourd'hui</div>
      <div class="legend-item"><div class="legend-dot deadline"></div>Deadline</div>
      <div class="legend-item"><div class="legend-dot past"></div>Passé</div>
    </div>
  </div>

</main>

<script>
const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const DEADLINE = new Date(2027, 0, 1);

const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_SHORT = ['L','M','M','J','V','S','D'];
const DAYS_LONG = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];

let viewYear = TODAY.getFullYear();
let viewMonth = TODAY.getMonth();

function diff(a, b) {
  return Math.round((b - a) / 86400000);
}

function fmt(d) {
  return d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3).toLowerCase() + '. ' + d.getFullYear();
}

function init() {
  const days = diff(TODAY, DEADLINE);
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30.44);

  let work = 0, c = new Date(TODAY);
  for (let i = 0; i < days; i++) {
    if (c.getDay() !== 0 && c.getDay() !== 6) work++;
    c.setDate(c.getDate() + 1);
  }

  document.getElementById('cnt-days').textContent = days;
  document.getElementById('cnt-months').textContent = months;
  document.getElementById('cnt-weeks').textContent = weeks;
  document.getElementById('cnt-work').textContent = work;
  document.getElementById('cnt-hours').textContent = (days * 24).toLocaleString('fr');
  document.getElementById('cnt-sub').textContent = weeks + ' semaines · ' + (days % 7) + ' jours';
  document.getElementById('today-label').textContent = DAYS_LONG[TODAY.getDay()] + ' ' + fmt(TODAY);

  const REF = new Date(2024, 0, 1);
  const total = diff(REF, DEADLINE);
  const elapsed = diff(REF, TODAY);
  const pct = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-start').textContent = fmt(TODAY);
}

function renderCal() {
  document.getElementById('cal-title').textContent = MONTHS[viewMonth] + ' ' + viewYear;

  document.getElementById('day-names').innerHTML =
    DAYS_SHORT.map(d => `<div class="day-name">${d}</div>`).join('');

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  let startDow = new Date(viewYear, viewMonth, 1).getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = 0; i < startDow; i++)
    grid.insertAdjacentHTML('beforeend', '<div class="day-cell"></div>');

  const total = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let d = 1; d <= total; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const isToday    = date.toDateString() === TODAY.toDateString();
    const isDeadline = date.toDateString() === DEADLINE.toDateString();
    const isPast     = date < TODAY;
    const isBeyond   = date > DEADLINE;

    let cls = 'day-cell';
    if (isToday)    cls += ' today';
    else if (isDeadline) cls += ' deadline';
    else if (isPast)     cls += ' past';
    else if (isBeyond)   cls += ' beyond';

    let sub = '';
    if (isDeadline) {
      sub = '<div class="day-rest">🏁<br>fin</div>';
    } else if (!isPast && !isBeyond) {
      sub = `<div class="day-rest">${diff(date, DEADLINE)}j</div>`;
    }

    grid.insertAdjacentHTML('beforeend',
      `<div class="${cls}"><div class="day-num">${d}</div>${sub}</div>`);
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCal();
}

init();
renderCal();
</script>
</body>
</html>
