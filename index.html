<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite 2027</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  overflow: hidden;
  background: linear-gradient(180deg, #7ecbf5 0%, #b8e4ff 45%, #8ed87a 45%, #5fb84d 100%);
}

@keyframes drive { from { left: -120px; } to { left: 105%; } }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes shimmer { 0%,100% { box-shadow: 0 0 40px #ffd93d88; } 50% { box-shadow: 0 0 70px #ffd93dcc; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

.sun {
  position: absolute;
  top: 28px; right: 70px;
  width: 80px; height: 80px;
  background: #ffd93d;
  border-radius: 50%;
  animation: shimmer 3s ease-in-out infinite;
}

.container {
  position: relative;
  z-index: 10;
  text-align: center;
  padding-top: 60px;
}

h1 {
  font-size: 2.2rem;
  font-weight: 500;
  color: #1a4a20;
  text-shadow: 0 2px 8px rgba(255,255,255,0.5);
  margin-bottom: 6px;
}

.subtitle {
  font-size: 1rem;
  color: #2d6e2d;
  margin-bottom: 32px;
}

.countdown {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}

.box {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 18px 20px;
  min-width: 110px;
  border: 1px solid rgba(255,255,255,0.7);
}

.number {
  font-size: 2.6rem;
  font-weight: 500;
  color: #1a4a20;
  line-height: 1;
}

.label {
  font-size: 0.75rem;
  color: #3a7a3a;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}

.message {
  font-size: 0.9rem;
  color: #1a4a20;
  font-weight: 500;
  margin-top: 24px;
  animation: pulse 3s ease-in-out infinite;
  display: inline-block;
}

.ground {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 100px;
  background: #5fb84d;
}

.hay { position: absolute; bottom: 62px; font-size: 42px; }
.hay1 { left: 8%; animation: bob 2.5s ease-in-out infinite; }
.hay2 { left: 38%; animation: bob 2.5s ease-in-out infinite 0.8s; }
.hay3 { left: 72%; animation: bob 2.5s ease-in-out infinite 1.4s; }

.horse { position: absolute; bottom: 62px; font-size: 44px; }
.horse1 { left: 22%; animation: bob 1.8s ease-in-out infinite 0.3s; }
.horse2 { left: 58%; animation: bob 1.8s ease-in-out infinite 0.9s; }

.tractor {
  position: absolute;
  bottom: 62px;
  font-size: 54px;
  animation: drive 18s linear infinite;
}
.tractor2 { animation-delay: 9s; }

.ground-strip {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 62px;
  background: #4aa33a;
}

.flower { position: absolute; bottom: 14px; }
</style>
</head>
<body>

<!-- Sun -->
<div class="sun"></div>

<!-- Sun rays -->
<svg style="position:absolute;top:12px;right:54px;" width="112" height="112" viewBox="0 0 112 112">
  <g stroke="#ffd93d" stroke-width="2" opacity="0.5">
    <line x1="56" y1="4" x2="56" y2="14"/>
    <line x1="56" y1="98" x2="56" y2="108"/>
    <line x1="4" y1="56" x2="14" y2="56"/>
    <line x1="98" y1="56" x2="108" y2="56"/>
    <line x1="18" y1="18" x2="25" y2="25"/>
    <line x1="87" y1="87" x2="94" y2="94"/>
    <line x1="94" y1="18" x2="87" y2="25"/>
    <line x1="25" y1="87" x2="18" y2="94"/>
  </g>
</svg>

<!-- Clouds -->
<svg style="position:absolute;top:30px;left:40px;" width="110" height="40" viewBox="0 0 110 40">
  <ellipse cx="45" cy="28" rx="42" ry="18" fill="white" opacity="0.82"/>
  <ellipse cx="70" cy="24" rx="28" ry="16" fill="white" opacity="0.82"/>
  <ellipse cx="25" cy="30" rx="22" ry="13" fill="white" opacity="0.82"/>
</svg>
<svg style="position:absolute;top:14px;left:240px;" width="80" height="34" viewBox="0 0 80 34">
  <ellipse cx="35" cy="22" rx="32" ry="14" fill="white" opacity="0.65"/>
  <ellipse cx="55" cy="18" rx="22" ry="12" fill="white" opacity="0.65"/>
</svg>

<!-- Birds -->
<svg style="position:absolute;top:55px;left:180px;" width="60" height="20" viewBox="0 0 60 20">
  <path d="M2 10 Q8 4 14 10" fill="none" stroke="#5a8fa0" stroke-width="1.5"/>
  <path d="M18 8 Q24 2 30 8" fill="none" stroke="#5a8fa0" stroke-width="1.5"/>
  <path d="M34 12 Q40 6 46 12" fill="none" stroke="#5a8fa0" stroke-width="1.5"/>
</svg>

<!-- Main content -->
<div class="container">
  <h1>🎉 Cap sur la Retraite</h1>
  <p class="subtitle">Le grand départ approche…</p>

  <div class="countdown">
    <div class="box">
      <div class="number" id="days">0</div>
      <div class="label">Jours</div>
    </div>
    <div class="box">
      <div class="number" id="hours">0</div>
      <div class="label">Heures</div>
    </div>
    <div class="box">
      <div class="number" id="minutes">0</div>
      <div class="label">Minutes</div>
    </div>
    <div class="box">
      <div class="number" id="seconds">0</div>
      <div class="label">Secondes</div>
    </div>
  </div>

  <div class="message">🚜 Encore un peu de route avant la liberté ! 🌾</div>
</div>

<!-- Ground scene -->
<div class="ground">
  <svg style="position:absolute;bottom:60px;left:0;" width="100%" height="50" viewBox="0 0 100 50" preserveAspectRatio="none">
    <path d="M0 50 Q12 10 24 30 Q38 50 53 20 Q67 0 82 25 Q94 45 100 30 L100 50 Z" fill="#4aa33a"/>
  </svg>
  <svg style="position:absolute;bottom:58px;left:0;width:100%;height:30px;" viewBox="0 0 680 30" preserveAspectRatio="none">
    <line x1="0" y1="10" x2="680" y2="10" stroke="#8b5e3c" stroke-width="2"/>
    <line x1="0" y1="22" x2="680" y2="22" stroke="#8b5e3c" stroke-width="2"/>
    <line x1="30"  y1="4" x2="30"  y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="90"  y1="4" x2="90"  y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="150" y1="4" x2="150" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="210" y1="4" x2="210" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="270" y1="4" x2="270" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="330" y1="4" x2="330" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="390" y1="4" x2="390" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="450" y1="4" x2="450" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="510" y1="4" x2="510" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="570" y1="4" x2="570" y2="28" stroke="#8b5e3c" stroke-width="3"/>
    <line x1="630" y1="4" x2="630" y2="28" stroke="#8b5e3c" stroke-width="3"/>
  </svg>

  <div class="hay hay1">🌾</div>
  <div class="hay hay2">🌾</div>
  <div class="hay hay3">🌾</div>
  <div class="horse horse1">🐴</div>
  <div class="horse horse2">🐴</div>
  <div class="tractor">🚜</div>
  <div class="tractor tractor2">🚜</div>

  <div class="ground-strip"></div>
  <div class="flower" style="left:5%;font-size:18px;">🌻</div>
  <div class="flower" style="left:15%;font-size:14px;">🌼</div>
  <div class="flower" style="left:48%;font-size:16px;">🌻</div>
  <div class="flower" style="left:65%;font-size:14px;">🌼</div>
  <div class="flower" style="left:85%;font-size:18px;">🌻</div>
  <div class="flower" style="left:92%;font-size:14px;">🌼</div>
</div>

<script>
const target = new Date("January 1, 2027 00:00:00").getTime();

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const dist = target - Date.now();

  if (dist <= 0) {
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;
        background:linear-gradient(180deg,#7ecbf5,#5fb84d);color:#1a4a20;
        font-family:Arial;text-align:center;padding:20px;">
        <div>
          <h1 style="font-size:3.5rem;margin-bottom:16px;">🎉 Bonne Retraite !</h1>
          <p style="font-size:1.5rem;">Il est temps de profiter de la vie ! 🚜🌾🐴</p>
        </div>
      </div>`;
    return;
  }

  document.getElementById('days').textContent    = Math.floor(dist / 864e5);
  document.getElementById('hours').textContent   = pad(Math.floor((dist % 864e5) / 36e5));
  document.getElementById('minutes').textContent = pad(Math.floor((dist % 36e5)  / 6e4));
  document.getElementById('seconds').textContent = pad(Math.floor((dist % 6e4)   / 1e3));
}

tick();
setInterval(tick, 1000);
</script>

</body>
</html>
